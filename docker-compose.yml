version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: spring-security
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: security
    ports:
      - "5332:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:8.2.7
    container_name: redis-caching
    ports:
      - "6379:6379"
volumes:
  postgres_data: